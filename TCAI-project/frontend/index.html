<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCAI Demo</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: #fffaf2;
        --border: #d7c7ae;
        --text: #2e2418;
        --muted: #6a5a46;
        --accent: #2e7d6b;
        --accent-dark: #1f5a4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(46, 125, 107, 0.14), transparent 32%),
          linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(46, 36, 24, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 140px;
        padding: 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        font: inherit;
        resize: vertical;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        padding: 12px 20px;
        font: inherit;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }

      .mode {
        margin: 0 0 18px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(46, 125, 107, 0.08);
        color: var(--text);
      }

      .mode strong {
        margin-right: 8px;
      }

      .answer {
        margin-top: 22px;
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.9);
      }

      .answer strong {
        display: block;
        margin-bottom: 10px;
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .app {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Turtle Care AI</h1>
      <p>
        Ask a turtle care question through the web UI. If a trained LoRA adapter
        is available, the backend will use it automatically; otherwise it falls
        back to the mock demo mode.
      </p>

      <div class="mode" id="mode-box">
        <strong>Current mode:</strong>
        <span id="mode-text">Checking...</span>
      </div>

      <form id="ask-form">
        <textarea
          id="question"
          name="question"
          placeholder="Example: Why did my turtle suddenly stop eating?"
          required
        ></textarea>
        <button type="submit">Ask TCAI</button>
      </form>

      <div class="status" id="status"></div>
      <section class="answer" id="answer-box" hidden>
        <strong>Answer</strong>
        <div id="answer-text"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById("ask-form");
      const questionInput = document.getElementById("question");
      const status = document.getElementById("status");
      const answerBox = document.getElementById("answer-box");
      const answerText = document.getElementById("answer-text");
      const modeText = document.getElementById("mode-text");

      async function loadMode() {
        try {
          const response = await fetch("/health");
          if (!response.ok) {
            throw new Error("Health check failed.");
          }

          const data = await response.json();
          const label = data.mode === "lora" ? "LoRA model" : "Mock fallback";
          const detail = data.detail ? ` (${data.detail})` : "";
          modeText.textContent = `${label}${detail}`;
        } catch (error) {
          modeText.textContent = "Backend status unavailable";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = questionInput.value.trim();
        if (!question) {
          status.textContent = "Please enter a question first.";
          answerBox.hidden = true;
          return;
        }

        status.textContent = "Generating answer...";
        answerBox.hidden = true;

        try {
          const response = await fetch("/ask", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ question }),
          });

          if (!response.ok) {
            throw new Error("Request failed.");
          }

          const data = await response.json();
          answerText.textContent = data.answer;
          answerBox.hidden = false;
          status.textContent = "Answer received.";
          loadMode();
        } catch (error) {
          status.textContent = "The API could not be reached. Please try again.";
          answerBox.hidden = true;
        }
      });

      loadMode();
    </script>
  </body>
</html>
